services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_voice_order_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_voice_order}
      POSTGRES_USER: ${POSTGRES_USER:-restaurant_voice_order}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restaurant_voice_order_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.11-slim
    container_name: restaurant_voice_order_api
    working_dir: /app
    profiles:
      - api
    env_file:
      - ../services/api/.env.example
    environment:
      API_DATABASE_URL: postgresql://restaurant_voice_order:restaurant_voice_order_dev_password@postgres:5432/restaurant_voice_order
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install -e '.[dev]' && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
